<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gatito vs Perrito</title>
  <style>
    :root {
      --bg1: #fff7fb;
      --bg2: #fdf2f8;
      --panel: #fffafc;
      --line: #f9c5d5;
      --text: #6b4f5f;
      --muted: #9a7b8b;
      --cat: #ff8fab;
      --dog: #a0c4ff;
      --win: #ffd166;
      --btn: #fbcfe8;
      --btn-hover: #f9a8d4;
      --shadow: rgba(212, 170, 190, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, #ffe5ec 0%, transparent 30%),
        radial-gradient(circle at bottom right, #dbeafe 0%, transparent 30%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text);
      padding: 20px;
    }

    .app {
      width: min(94vw, 460px);
      background: var(--panel);
      border: 3px solid #ffd6e7;
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 18px 40px var(--shadow);
    }

    h1 {
      margin: 0 0 6px;
      text-align: center;
      font-size: 2rem;
      color: #8c5a73;
    }

    .subtitle {
      margin: 0 0 18px;
      text-align: center;
      color: var(--muted);
      font-size: 1rem;
    }

    .status {
      text-align: center;
      margin-bottom: 18px;
      padding: 14px;
      border-radius: 18px;
      background: #fff0f6;
      border: 2px solid #ffd6e7;
      font-weight: bold;
      font-size: 1.05rem;
    }

    .score {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 0 0 18px;
      text-align: center;
    }

    .score-box {
      background: #fff7fb;
      border: 2px solid #fbcfe8;
      border-radius: 16px;
      padding: 10px 8px;
      box-shadow: 0 6px 16px rgba(251, 207, 232, 0.25);
    }

    .score-box strong {
      display: block;
      font-size: 1.3rem;
      margin-top: 6px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    .cell {
      aspect-ratio: 1 / 1;
      border: 2px solid var(--line);
      border-radius: 22px;
      background: #fff;
      font-size: 3rem;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 8px 18px rgba(249, 196, 214, 0.18);
    }

    .cell:hover:not(:disabled) {
      transform: translateY(-2px) scale(1.02);
      background: #fff9fc;
      box-shadow: 0 12px 22px rgba(249, 196, 214, 0.28);
    }

    .cell:disabled {
      cursor: default;
    }

    .cell.cat {
      background: #fff0f5;
    }

    .cell.dog {
      background: #eef6ff;
    }

    .cell.win {
      background: #fff4c2;
      border-color: #ffcf70;
      box-shadow: 0 0 0 3px rgba(255, 209, 102, 0.25);
    }

    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .action {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      background: var(--btn);
      color: #7a4f63;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.95rem;
      transition: transform 0.15s ease, background 0.2s ease;
      box-shadow: 0 6px 16px rgba(251, 168, 212, 0.25);
    }

    .action:hover {
      background: var(--btn-hover);
      transform: translateY(-1px);
    }

    .legend {
      margin-top: 16px;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    @media (max-width: 480px) {
      .cell {
        font-size: 2.5rem;
      }

      h1 {
        font-size: 1.7rem;
      }
    }

    /* Modal de Victoria */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(107, 79, 95, 0.4);
      backdrop-filter: blur(8px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      background: var(--panel);
      border: 3px solid #ffd6e7;
      border-radius: 28px;
      padding: 32px;
      width: min(90vw, 400px);
      text-align: center;
      box-shadow: 0 24px 50px rgba(212, 170, 190, 0.4);
      transform: scale(0.85);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .modal-overlay.active .modal-content {
      transform: scale(1);
    }

    .modal-emoji {
      font-size: 5rem;
      margin-bottom: 12px;
      animation: bounce 1.2s infinite alternate;
    }

    .modal-content h2 {
      margin: 0 0 8px;
      color: #8c5a73;
      font-size: 2.2rem;
    }

    .modal-content p {
      font-size: 1.2rem;
      color: var(--text);
      margin: 0 0 24px;
    }

    @keyframes bounce {
      0% {
        transform: translateY(0) scale(1);
      }
      100% {
        transform: translateY(-15px) scale(1.05);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Gatito vs Perrito</h1>
    <p class="subtitle">Juego de gato en versión tiernita pastel</p>

    <div class="status" id="status">Turno de Gatito 🐱</div>

    <div class="score">
      <div class="score-box">
        Gatito 🐱
        <strong id="scoreCat">0</strong>
      </div>
      <div class="score-box">
        Empates
        <strong id="scoreDraw">0</strong>
      </div>
      <div class="score-box">
        Perrito 🐶
        <strong id="scoreDog">0</strong>
      </div>
    </div>

    <div class="board" id="board">
      <button class="cell" data-index="0" aria-label="casilla 1"></button>
      <button class="cell" data-index="1" aria-label="casilla 2"></button>
      <button class="cell" data-index="2" aria-label="casilla 3"></button>
      <button class="cell" data-index="3" aria-label="casilla 4"></button>
      <button class="cell" data-index="4" aria-label="casilla 5"></button>
      <button class="cell" data-index="5" aria-label="casilla 6"></button>
      <button class="cell" data-index="6" aria-label="casilla 7"></button>
      <button class="cell" data-index="7" aria-label="casilla 8"></button>
      <button class="cell" data-index="8" aria-label="casilla 9"></button>
    </div>

    <div class="controls">
      <button class="action" id="resetGame">Reiniciar partida</button>
      <button class="action" id="resetScore">Reiniciar marcador</button>
      <button class="action" id="toggleSound">Sonido: activado</button>
    </div>

    <div class="legend">
      Gatito = 🐱 | Perrito = 🐶
    </div>
  </div>

  <!-- Modal de Victoria -->
  <div class="modal-overlay" id="winModal">
    <div class="modal-content">
      <div class="modal-emoji" id="modalEmoji">🐱</div>
      <h2>¡Felicidades!</h2>
      <p id="modalMessage">Ganó Gatito 🐱</p>
      <button class="action" id="closeModal">Jugar de nuevo</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script>
    const cells = document.querySelectorAll(".cell");
    const statusEl = document.getElementById("status");
    const resetGameBtn = document.getElementById("resetGame");
    const resetScoreBtn = document.getElementById("resetScore");
    const toggleSoundBtn = document.getElementById("toggleSound");

    const winModal = document.getElementById("winModal");
    const modalEmoji = document.getElementById("modalEmoji");
    const modalMessage = document.getElementById("modalMessage");
    const closeModalBtn = document.getElementById("closeModal");

    const scoreCatEl = document.getElementById("scoreCat");
    const scoreDogEl = document.getElementById("scoreDog");
    const scoreDrawEl = document.getElementById("scoreDraw");

    let board = Array(9).fill("");
    let currentPlayer = "cat";
    let gameActive = true;
    let soundEnabled = true;

    let score = {
      cat: 0,
      dog: 0,
      draw: 0
    };

    const symbols = {
      cat: "🐱",
      dog: "🐶"
    };

    const names = {
      cat: "Gatito 🐱",
      dog: "Perrito 🐶"
    };

    function triggerConfetti() {
      if (typeof confetti === "function") {
        const duration = 3 * 1000;
        const animationEnd = Date.now() + duration;
        const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 1100 };

        function randomInRange(min, max) {
          return Math.random() * (max - min) + min;
        }

        const interval = setInterval(function() {
          const timeLeft = animationEnd - Date.now();

          if (timeLeft <= 0) {
            return clearInterval(interval);
          }

          const particleCount = 50 * (timeLeft / duration);
          confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } });
          confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } });
        }, 250);
      } else {
        createDOMConfetti();
      }
    }

    function createDOMConfetti() {
      const colors = ["#ff8fab", "#a0c4ff", "#ffd166", "#fbcfe8", "#ffc6ff", "#bdb2ff"];
      for (let i = 0; i < 80; i++) {
        const particle = document.createElement("div");
        particle.style.position = "fixed";
        particle.style.width = Math.random() * 8 + 4 + "px";
        particle.style.height = Math.random() * 8 + 4 + "px";
        particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        particle.style.left = Math.random() * 100 + "vw";
        particle.style.top = "-20px";
        particle.style.borderRadius = Math.random() > 0.5 ? "50%" : "0";
        particle.style.zIndex = "1100";
        particle.style.pointerEvents = "none";
        document.body.appendChild(particle);

        const duration = Math.random() * 2 + 1.5;
        const drift = Math.random() * 200 - 100;

        particle.animate([
          { transform: "translateY(0) rotate(0deg)", opacity: 1 },
          { transform: `translateY(110vh) translateX(${drift}px) rotate(${Math.random() * 360}deg)`, opacity: 0 }
        ], {
          duration: duration * 1000,
          easing: "ease-out"
        }).onfinish = () => particle.remove();
      }
    }

    const winPatterns = [
      [0, 1, 2],
      [3, 4, 5],
      [6, 7, 8],
      [0, 3, 6],
      [1, 4, 7],
      [2, 5, 8],
      [0, 4, 8],
      [2, 4, 6]
    ];

    function playTone(frequency, duration, type = "sine", volume = 0.03) {
      if (!soundEnabled) return;

      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return;

      const audioCtx = new AudioContextClass();
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();

      oscillator.type = type;
      oscillator.frequency.value = frequency;
      gainNode.gain.value = volume;

      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      oscillator.start();

      gainNode.gain.exponentialRampToValueAtTime(
        0.0001,
        audioCtx.currentTime + duration
      );

      oscillator.stop(audioCtx.currentTime + duration);

      oscillator.onended = () => {
        audioCtx.close();
      };
    }

    function playMoveSound() {
      playTone(currentPlayer === "cat" ? 660 : 520, 0.12, "triangle", 0.035);
    }

    function playWinSound() {
      if (!soundEnabled) return;
      playTone(523, 0.12, "triangle", 0.04);
      setTimeout(() => playTone(659, 0.12, "triangle", 0.04), 120);
      setTimeout(() => playTone(784, 0.18, "triangle", 0.04), 240);
    }

    function playDrawSound() {
      if (!soundEnabled) return;
      playTone(430, 0.12, "sine", 0.03);
      setTimeout(() => playTone(380, 0.16, "sine", 0.03), 120);
    }

    function handleCellClick(event) {
      const cell = event.target;
      const index = Number(cell.dataset.index);

      if (!gameActive || board[index] !== "") {
        return;
      }

      board[index] = currentPlayer;
      cell.textContent = symbols[currentPlayer];
      cell.classList.add(currentPlayer);

      playMoveSound();

      const winningPattern = getWinningPattern();

      if (winningPattern) {
        gameActive = false;
        highlightWin(winningPattern);
        score[currentPlayer]++;
        updateScore();
        statusEl.textContent = "Ganó " + names[currentPlayer];
        disableBoard();
        playWinSound();
        return;
      }

      if (board.every(value => value !== "")) {
        gameActive = false;
        score.draw++;
        updateScore();
        statusEl.textContent = "Empate tierno 💖";
        playDrawSound();
        return;
      }

      currentPlayer = currentPlayer === "cat" ? "dog" : "cat";
      statusEl.textContent = "Turno de " + names[currentPlayer];
    }

    function getWinningPattern() {
      for (const pattern of winPatterns) {
        const [a, b, c] = pattern;
        if (
          board[a] &&
          board[a] === board[b] &&
          board[a] === board[c]
        ) {
          return pattern;
        }
      }
      return null;
    }

    function highlightWin(pattern) {
      pattern.forEach(index => {
        cells[index].classList.add("win");
      });
    }

    function disableBoard() {
      cells.forEach(cell => {
        cell.disabled = true;
      });
    }

    function resetGame() {
      board = Array(9).fill("");
      currentPlayer = "cat";
      gameActive = true;
      statusEl.textContent = "Turno de Gatito 🐱";

      cells.forEach(cell => {
        cell.textContent = "";
        cell.disabled = false;
        cell.className = "cell";
      });
    }

    function resetScore() {
      score = { cat: 0, dog: 0, draw: 0 };
      updateScore();
      resetGame();
    }

    function updateScore() {
      scoreCatEl.textContent = score.cat;
      scoreDogEl.textContent = score.dog;
      scoreDrawEl.textContent = score.draw;
    }

    function toggleSound() {
      soundEnabled = !soundEnabled;
      toggleSoundBtn.textContent = soundEnabled
        ? "Sonido: activado"
        : "Sonido: desactivado";
    }

    cells.forEach(cell => {
      cell.addEventListener("click", handleCellClick);
    });

    resetGameBtn.addEventListener("click", resetGame);
    resetScoreBtn.addEventListener("click", resetScore);
    toggleSoundBtn.addEventListener("click", toggleSound);
  </script>
</body>
</html>
